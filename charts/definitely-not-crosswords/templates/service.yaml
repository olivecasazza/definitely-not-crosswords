apiVersion: v1
kind: Service
metadata:
  name: {{ include "definitely-not-crosswords.fullname" . }}
  labels:
    {{- include "definitely-not-crosswords.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.service.wsPort }}
      targetPort: ws
      protocol: TCP
      name: ws
  selector:
    {{- include "definitely-not-crosswords.selectorLabels" . | nindent 4 }}
