apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "definitely-not-crosswords.fullname" . }}
  labels:
    {{- include "definitely-not-crosswords.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "definitely-not-crosswords.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "definitely-not-crosswords.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "definitely-not-crosswords.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.adminUsers.enabled }}
      initContainers:
        - name: seed-admin-users
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["node", "/app/scripts/seed_admin_users.mjs"]
          env:
            - name: ADMIN_USERS_JSON
              value: {{ toJson .Values.adminUsers | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  {{- if .Values.database.cnpg.enabled }}
                  name: {{ include "definitely-not-crosswords.fullname" . }}-db-app
                  key: uri
                  {{- else if .Values.database.external.existingSecret }}
                  name: {{ .Values.database.external.existingSecret }}
                  key: {{ .Values.database.external.existingSecretKey }}
                  {{- else }}
                  name: {{ include "definitely-not-crosswords.fullname" . }}-secrets
                  key: DATABASE_URL
                  {{- end }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
            - name: ws
              containerPort: {{ .Values.service.wsPort }}
              protocol: TCP
            {{- if .Values.observability.otel.enabled }}
            - name: otel-metrics
              containerPort: {{ .Values.observability.otel.port | default 9464 }}
              protocol: TCP
            {{- end }}
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          env:
            - name: PORT
              value: "{{ .Values.service.port }}"
            - name: NUXT_PORT
              value: "{{ .Values.service.port }}"
            - name: KEYCLOAK_CLIENT_ID
              value: {{ .Values.auth.clientId | quote }}
            - name: KEYCLOAK_ISSUER
              value: {{ .Values.auth.issuer | quote }}
            - name: NUXT_AUTH_ORIGIN
              value: {{ .Values.auth.origin | trimSuffix "/api/auth/" | trimSuffix "/api/auth" | quote }}
            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  {{- if .Values.auth.existingSecret }}
                  name: {{ .Values.auth.existingSecret }}
                  {{- else }}
                  name: {{ include "definitely-not-crosswords.fullname" . }}-secrets
                  {{- end }}
                  key: KEYCLOAK_CLIENT_SECRET
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  {{- if .Values.auth.existingSecret }}
                  name: {{ .Values.auth.existingSecret }}
                  {{- else }}
                  name: {{ include "definitely-not-crosswords.fullname" . }}-secrets
                  {{- end }}
                  key: NEXTAUTH_SECRET
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  {{- if .Values.database.cnpg.enabled }}
                  name: {{ include "definitely-not-crosswords.fullname" . }}-db-app
                  key: uri
                  {{- else if .Values.database.external.existingSecret }}
                  name: {{ .Values.database.external.existingSecret }}
                  key: {{ .Values.database.external.existingSecretKey }}
                  {{- else }}
                  name: {{ include "definitely-not-crosswords.fullname" . }}-secrets
                  key: DATABASE_URL
                  {{- end }}
            {{- if .Values.observability.otel.enabled }}
            - name: NODE_OPTIONS
              value: "--require ./otel.cjs"
            - name: OTEL_METRICS_PORT
              value: "{{ .Values.observability.otel.port | default 9464 }}"
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
