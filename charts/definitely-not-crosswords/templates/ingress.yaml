{{- if .Values.ingress.enabled -}}
{{- $fullName := include "definitely-not-crosswords.fullname" . -}}
{{- $svcPort := .Values.service.port -}}
{{- $wsPort := .Values.service.wsPort -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "definitely-not-crosswords.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ $fullName }}
                port:
                  # If the path is /trpc-ws or similar, route to ws port, else http port
                  number: {{ if contains "ws" .path }}{{ $wsPort }}{{ else }}{{ $svcPort }}{{ end }}
          {{- end }}
    {{- end }}
{{- end }}
