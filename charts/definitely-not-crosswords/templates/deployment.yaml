apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "definitely-not-crosswords.fullname" . }}
  labels:
    {{- include "definitely-not-crosswords.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "definitely-not-crosswords.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "definitely-not-crosswords.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "definitely-not-crosswords.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if or .Values.database.migrations.enabled .Values.adminUsers.enabled .Values.dictionarySeed.enabled }}
      initContainers:
        {{- if .Values.database.migrations.enabled }}
        - name: migrate-db
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["migrate"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  {{- if .Values.database.cnpg.enabled }}
                  name: {{ include "definitely-not-crosswords.fullname" . }}-db-app
                  key: uri
                  {{- else if .Values.database.external.existingSecret }}
                  name: {{ .Values.database.external.existingSecret }}
                  key: {{ .Values.database.external.existingSecretKey }}
                  {{- else }}
                  name: {{ include "definitely-not-crosswords.fullname" . }}-secrets
                  key: DATABASE_URL
                  {{- end }}
        {{- end }}
        {{- if .Values.adminUsers.enabled }}
        - name: seed-admin-users
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["seed_admin"]
          env:
            - name: ADMIN_USERS_JSON
              value: {{ toJson .Values.adminUsers | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  {{- if .Values.database.cnpg.enabled }}
                  name: {{ include "definitely-not-crosswords.fullname" . }}-db-app
                  key: uri
                  {{- else if .Values.database.external.existingSecret }}
                  name: {{ .Values.database.external.existingSecret }}
                  key: {{ .Values.database.external.existingSecretKey }}
                  {{- else }}
                  name: {{ include "definitely-not-crosswords.fullname" . }}-secrets
                  key: DATABASE_URL
                  {{- end }}
        {{- end }}
        {{- if .Values.dictionarySeed.enabled }}
        - name: seed-dictionary
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["seed", "--skip-if-present"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  {{- if .Values.database.cnpg.enabled }}
                  name: {{ include "definitely-not-crosswords.fullname" . }}-db-app
                  key: uri
                  {{- else if .Values.database.external.existingSecret }}
                  name: {{ .Values.database.external.existingSecret }}
                  key: {{ .Values.database.external.existingSecretKey }}
                  {{- else }}
                  name: {{ include "definitely-not-crosswords.fullname" . }}-secrets
                  key: DATABASE_URL
                  {{- end }}
        {{- end }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
            {{- if .Values.observability.otel.enabled }}
            - name: otel-metrics
              containerPort: {{ .Values.observability.otel.port | default 9464 }}
              protocol: TCP
            {{- end }}
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          env:
            # PORT and WEB_DIST (the bundled wasm frontend, served single-origin
            # with /api) are baked into the image; only secrets are injected here.
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  {{- if .Values.auth.existingSecret }}
                  name: {{ .Values.auth.existingSecret }}
                  {{- else }}
                  name: {{ include "definitely-not-crosswords.fullname" . }}-secrets
                  {{- end }}
                  key: NEXTAUTH_SECRET
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  {{- if .Values.database.cnpg.enabled }}
                  name: {{ include "definitely-not-crosswords.fullname" . }}-db-app
                  key: uri
                  {{- else if .Values.database.external.existingSecret }}
                  name: {{ .Values.database.external.existingSecret }}
                  key: {{ .Values.database.external.existingSecretKey }}
                  {{- else }}
                  name: {{ include "definitely-not-crosswords.fullname" . }}-secrets
                  key: DATABASE_URL
                  {{- end }}
            {{- if .Values.billing.proDiscountCode }}
            # Auto-applied to Pro checkouts (staging sets this so Pro is $1).
            - name: PRO_CHECKOUT_DISCOUNT_CODE
              value: {{ .Values.billing.proDiscountCode | quote }}
            {{- end }}
            {{- if .Values.billing.lemonSqueezy.enabled }}
            {{- $ls := .Values.billing.lemonSqueezy.existingSecret | default (printf "%s-secrets" (include "definitely-not-crosswords.fullname" .)) }}
            - name: LEMONSQUEEZY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $ls }}
                  key: LEMONSQUEEZY_API_KEY
            - name: LEMONSQUEEZY_STORE_ID
              valueFrom:
                secretKeyRef:
                  name: {{ $ls }}
                  key: LEMONSQUEEZY_STORE_ID
            - name: LEMONSQUEEZY_VARIANT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ $ls }}
                  key: LEMONSQUEEZY_VARIANT_ID
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
