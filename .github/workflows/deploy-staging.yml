name: deploy-staging

# Continuous staging deploy. Flux's built-in image-automation can't drive this
# repo's deploy: the cluster is one kubenix-generated manifests.yaml (single-line
# JSON), and the `$imagepolicy` setter marker lives in a Nix comment that Flux's
# YAML-only Setter strategy never sees. So instead we bump the staging image tag in
# the git source of truth (nixlab crosswords.nix); nixlab's rebuild-k8s-manifests
# workflow regenerates manifests.yaml and Flux applies it. Prod stays pinned.
#
# Triggered AFTER the image build (CI/CD Pipeline) succeeds for a tag — not on the
# tag push itself — so staging is never pointed at an image not yet in the registry.

on:
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    types: [completed]
  # Manual escape hatch: redeploy staging to an arbitrary already-built tag.
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to deploy to staging (e.g. v0.1.1)"
        required: true

# Serialize: never race two tag bumps against nixlab main.
concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  bump-staging-tag:
    name: Bump nixlab staging image tag
    runs-on: ubuntu-latest
    # Only for a successful image build of a tag (head_branch is the tag name,
    # e.g. v0.1.2), or a manual dispatch. Skips main-branch pipeline runs.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    # Reuses RELEASE_PLZ_TOKEN — it must be a PAT with contents:write on
    # casazza-info/nixlab (it already cuts crosswords tags; classic-PAT `repo`
    # scope covers both repos). Inert if the secret is absent.
    steps:
      - name: Update the staging image tag in nixlab
        env:
          # Manual dispatch supplies the tag; otherwise it's the built tag.
          TAG: ${{ github.event.inputs.tag || github.event.workflow_run.head_branch }}
          NIXLAB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
        run: |
          if [ -z "$NIXLAB_TOKEN" ]; then
            echo "RELEASE_PLZ_TOKEN not set — skipping staging deploy."
            exit 0
          fi
          set -euo pipefail
          git clone --depth 1 "https://x-access-token:${NIXLAB_TOKEN}@github.com/casazza-info/nixlab.git" nixlab
          cd nixlab
          file=modules/k8s/apps/crosswords.nix
          # Rewrite only the line carrying the crosswords-staging $imagepolicy marker,
          # so the pinned prod tag (no marker) is never touched.
          sed -i -E 's|tag = "v[0-9]+\.[0-9]+\.[0-9]+"; # \{"\$imagepolicy": "apps:crosswords-staging"\}|tag = "'"$TAG"'"; # {"$imagepolicy": "apps:crosswords-staging"}|' "$file"
          if git diff --quiet; then
            echo "Staging already at $TAG — nothing to do."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -aqm "chore(k8s): deploy crosswords staging to $TAG"
          # nixlab's rebuild-k8s-manifests workflow regenerates manifests.yaml from
          # this .nix change and Flux applies it.
          git push origin HEAD:main
          echo "Bumped nixlab crosswords staging to $TAG"
