# Default values for definitely-not-crosswords.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

# Deploy environment: "local" | "staging" | "production". Injected as APP_ENV,
# which the server exposes at /api/config so the shared wasm bundle can feature-gate
# (staging banner, dev-login bypass) at runtime. Default production = most locked down.
environment: "production"

image:
  # The nix-built Rust server image (pushed by CI to GAR as :latest and :<sha>).
  repository: us-central1-docker.pkg.dev/casazza-identity/nixlab/definitely-not-crosswords
  pullPolicy: Always
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  # The Rust server serves HTTP, /api, and the tRPC WebSocket all on one port.
  port: 3000

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
    # nginx.ingress.kubernetes.io/websocket-services: "definitely-not-crosswords"
  hosts:
    - host: definitely-not-crosswords.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: definitely-not-crosswords-tls
  #    hosts:
  #      - definitely-not-crosswords.local

# Authentication (Keycloak via @sidebase/nuxt-auth)
auth:
  createSecret: true
  existingSecret: ""  # If specified, references an existing Secret instead of creating one
  clientId: "crosswords"
  clientSecret: "supersecretcrosswords"
  issuer: "https://auth.casazza.io/realms/master"
  origin: "https://definitely-not-crosswords.local"
  nextAuthSecret: "supersecretsecret"

# Billing (Lemon Squeezy Pro checkout).
billing:
  lemonSqueezy:
    # Off until credentials exist. When enabled, the deployment injects
    # LEMONSQUEEZY_API_KEY / LEMONSQUEEZY_STORE_ID / LEMONSQUEEZY_VARIANT_ID from
    # the named secret (defaults to the app secret).
    enabled: false
    existingSecret: ""
  # A discount code auto-applied to every Pro checkout. Staging sets this to a
  # ~90%-off code so Pro is $1; empty on prod (users can still enter codes).
  proDiscountCode: ""

# Admin users are reconciled before the app starts. Existing users are updated
# to the configured role and marked verified when emailVerified is true.
adminUsers:
  enabled: true
  users:
    - email: "olive@casazza.info"
      name: "Olive Casazza"
      role: "ADMIN"
      emailVerified: true
    - email: "olive.casazza@gmail.com"
      name: "Olive Casazza"
      role: "ADMIN"
      emailVerified: true

# Dictionary data is reconciled before the app starts. The seed script is
# idempotent and skips work when dictionary rows and definitions already exist.
dictionarySeed:
  enabled: true

# E2E demo/canary test users (Playwright logs in with these). usersJson holds
# {"team": {"name": "..."}, "users": [{email, name, password}]} (team
# optional) and is rendered into the app secret — set it from sops, never
# plaintext in values. The seed upserts users (drift-only re-hash) and the
# shared team, so it's safe on every deploy. Off in this file; staging enables
# it (prod should not carry test users).
e2eUsers:
  enabled: false
  usersJson: ""
  # Read E2E_USERS_JSON from an existing secret instead of usersJson (sops /
  # ExternalSecret-managed clusters use this — same pattern as lemonSqueezy).
  existingSecret: ""

# Weekly platform game seeding (batch-generates published public games owned by
# the Platform system user). Runs the server image in SEED_GAMES mode.
gameSeed:
  enabled: false
  schedule: "0 6 * * 1"   # weekly, Monday 06:00 UTC
  count: 5
  topics: "animals,science,music,history,food,sports,geography,movies,space,nature"

# Database Configuration (PostgreSQL)
database:
  migrations:
    # sqlx migrations (crossword-tools `migrate`), run as an init container. Safe
    # on every deploy: the migrate bin adopts a pre-existing (Prisma-created)
    # schema once, then applies only new migrations — so schema changes ship
    # automatically with the image.
    enabled: true
  # CloudNative-PG Integration
  cnpg:
    enabled: false
    instances: 3
    storageSize: 10Gi
    databaseName: definitely_not_crosswords
    ownerName: postgres
  # External PostgreSQL Settings (used if cnpg.enabled is false)
  external:
    url: "" # e.g. postgresql://postgres:postgres@localhost:5432/postgres
    existingSecret: ""
    existingSecretKey: "DATABASE_URL"

# Observability Configuration
observability:
  otel:
    # The Rust server does not expose OTEL/Prometheus metrics yet (follow-up).
    enabled: false
    port: 9464
  serviceMonitor:
    enabled: false
    interval: 15s
    path: /metrics
    port: otel-metrics
    labels: {}
      # release: prometheus
  grafanaDashboard:
    enabled: false
    # Namespace used for GrafanaDashboard/ConfigMap resources.
    # If empty, defaults to the release namespace.
    namespace: ""
    # Dashboard folder in Grafana.
    folder: "Applications"
    # Leave true when dashboards are created outside the Grafana instance namespace.
    allowCrossNamespaceImport: true
    labels:
      grafana_dashboard: "1"


resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines or set them to values appropriate for your application.
  # limits:
  #   cpu: 500m
  #   memory: 512Mi
  # requests:
  #   cpu: 100m
  #   memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}
